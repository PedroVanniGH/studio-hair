# docker-compose.yml
# Para desarrollo local sin instalar PostgreSQL.
# Requisito: tener Docker Desktop instalado (https://www.docker.com/products/docker-desktop/)
#
# Comandos:
#   docker compose up -d       → levantar la DB
#   docker compose down        → apagar
#   docker compose down -v     → apagar y borrar datos

version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: studiohair-db
    restart: unless-stopped
    environment:
      POSTGRES_USER:     studiohair
      POSTGRES_PASSWORD: studiohair_dev
      POSTGRES_DB:       studiohair
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U studiohair"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
