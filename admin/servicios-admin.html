<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Servicios — Studio Hair Admin</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="../css/admin.css">
</head>
<body>
<div class="admin-layout">
  <div id="sidebar-mount"></div>
  <header class="admin-topbar" role="banner">
    <div class="topbar-title">Servicios</div>
    <div class="topbar-actions">
      <div class="topbar-user"><div class="topbar-avatar" aria-hidden="true">A</div><span>Admin</span></div>
    </div>
  </header>
  <main class="admin-main">
    <div class="admin-page">
      <div class="admin-page-header">
        <div><h1>Servicios</h1><p>Listado de todos los servicios del catálogo.</p></div>
      </div>

      <div class="info-banner">
        <strong>Nota:</strong> Esta es una vista de solo lectura del catálogo de servicios. En una versión con backend, podrías crear, editar y eliminar servicios desde acá.
      </div>

      <div class="admin-card">
        <div class="admin-card-header">
          <h3 id="svc-count-title">Catálogo de servicios</h3>
          <div class="filter-row">
            <select class="admin-select" id="svc-cat-filter" onchange="filterAdminServices(this.value)" aria-label="Filtrar por categoría">
              <option value="todos">Todas las categorías</option>
            </select>
          </div>
        </div>
        <div class="table-wrap">
          <table class="data-table" aria-label="Catálogo de servicios">
            <thead>
              <tr><th>Servicio</th><th>Categoría</th><th>Duración</th><th>Precio desde</th><th>Popular</th><th>Estado</th></tr>
            </thead>
            <tbody id="services-admin-tbody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
</div>
<div class="toast-container" id="toast-container" aria-live="polite"></div>
<script src="../js/data.js"></script>
<script src="../js/admin.js"></script>
<script src="shared.js"></script>
<script>
  Admin.requireAuth();

  document.getElementById("svc-count-title").textContent = `Catálogo de servicios (${SH.services.length} servicios)`;

  const catSel = document.getElementById("svc-cat-filter");
  SH.categories.forEach(c => catSel.innerHTML += `<option value="${c.id}">${c.icon} ${c.label}</option>`);

  renderServicesTable("todos");

  function filterAdminServices(cat) { renderServicesTable(cat); }

  function renderServicesTable(cat) {
    const svcs = cat === "todos" ? SH.services : SH.services.filter(s => s.category === cat);
    document.getElementById("services-admin-tbody").innerHTML = svcs.map(s => `
      <tr>
        <td>
          <div class="table-svc-cell">
            <img src="${s.image}" alt="" class="table-svc-img">
            <div>
              <strong>${s.name}</strong>
              <div class="table-svc-desc">${s.description}</div>
            </div>
          </div>
        </td>
        <td>${Utils.getCategoryLabel(s.category)}</td>
        <td>${s.duration} min <small class="text-muted">+${s.buffer}m</small></td>
        <td class="table-price">${Utils.formatPrice(s.price)}</td>
        <td>${s.popular ? '<span class="badge badge-gold">★ Popular</span>' : '—'}</td>
        <td><span class="badge ${s.active ? 'badge-active' : 'badge-inactive'}">${s.active ? 'Activo' : 'Inactivo'}</span></td>
      </tr>`).join("");
  }
</script>
</body>
</html>
