<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profesionales — Studio Hair Admin</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="../css/admin.css">
</head>
<body>
<div class="admin-layout">
  <div id="sidebar-mount"></div>
  <header class="admin-topbar" role="banner">
    <div class="topbar-title">Profesionales</div>
    <div class="topbar-actions">
      <div class="topbar-user"><div class="topbar-avatar" aria-hidden="true">A</div><span>Admin</span></div>
    </div>
  </header>
  <main class="admin-main">
    <div class="admin-page">
      <div class="admin-page-header">
        <div><h1>Profesionales</h1><p>Equipo de trabajo de todas las sucursales.</p></div>
      </div>

      <!-- Cards de profesionales -->
      <div id="staff-admin-grid" class="staff-admin-grid"></div>
    </div>
  </main>
</div>

<!-- Modal detalle profesional -->
<div class="modal-backdrop" id="modal-staff-detail" role="dialog" aria-modal="true" aria-labelledby="staff-detail-title">
  <div class="modal">
    <div class="modal-header">
      <h3 id="staff-detail-title">Perfil del profesional</h3>
      <button class="modal-close" onclick="Admin.closeModal('modal-staff-detail')" aria-label="Cerrar">✕</button>
    </div>
    <div class="modal-body" id="staff-detail-body"></div>
    <div class="modal-footer"><button class="btn btn-outline" onclick="Admin.closeModal('modal-staff-detail')">Cerrar</button></div>
  </div>
</div>

<div class="toast-container" id="toast-container" aria-live="polite"></div>
<script src="../js/data.js"></script>
<script src="../js/admin.js"></script>
<script src="shared.js"></script>
<script>
  Admin.requireAuth();

  const allApts = Store.getAppointments();

  document.getElementById("staff-admin-grid").innerHTML = SH.staff.filter(p => p.active).map(p => {
    const branch   = Utils.getBranchById(p.branch_id);
    const pApts    = allApts.filter(a => a.staff_id === p.id && !["cancelado"].includes(a.status));
    const initials = p.name.split(" ").map(n => n[0]).slice(0,2).join("").toUpperCase();
    return `
    <div class="admin-card admin-card--clickable" onclick="viewStaff('${p.id}')">
      <div class="staff-admin-card-header">
        <img src="${p.image}" alt="${p.name}" class="staff-admin-avatar">
        <div class="staff-admin-info">
          <div class="staff-admin-name">${p.name}</div>
          <div class="staff-admin-role">${p.role}</div>
          <div class="staff-admin-loc">📍 ${branch?.name?.replace('Studio Hair ','') || '—'}</div>
          <div class="staff-admin-stats">
            <span class="text-gold">★ ${p.rating}</span>
            <span class="text-muted">(${p.reviews} reseñas)</span>
            <span class="text-muted">· ${pApts.length} turnos</span>
          </div>
        </div>
        <span class="badge badge-active">Activo</span>
      </div>
      <div class="staff-admin-specialties">
        ${p.specialties.map(sp => `<span class="specialty-tag">${sp}</span>`).join("")}
      </div>
    </div>`;
  }).join("");

  function viewStaff(id) {
    const p = SH.staff.find(s => s.id === id);
    if (!p) return;
    const branch = Utils.getBranchById(p.branch_id);
    const pApts  = allApts.filter(a => a.staff_id === p.id);
    const body = document.getElementById("staff-detail-body");
    body.innerHTML = `
      <div class="staff-detail-header">
        <img src="${p.image}" alt="${p.name}" class="staff-detail-avatar">
        <div>
          <h3 class="staff-detail-name">${p.name}</h3>
          <div class="staff-detail-role">${p.role}</div>
          <div class="staff-detail-loc">📍 ${branch?.name || '—'}</div>
          <div class="staff-detail-loc">📸 ${p.instagram}</div>
        </div>
      </div>
      <p class="staff-detail-bio">${p.bio}</p>
      <p class="staff-detail-row"><strong>Especialidades:</strong> ${p.specialties.join(", ")}</p>
      <p class="staff-detail-row"><strong>Rating:</strong> ★ ${p.rating} (${p.reviews} reseñas)</p>
      <p class="staff-detail-row"><strong>Total de turnos registrados:</strong> ${pApts.length}</p>
      <p class="staff-detail-row"><strong>Servicios habilitados:</strong></p>
      <div class="tags-flex">
        ${p.services.map(sid => {const s=Utils.getServiceById(sid);return s?`<span class="specialty-tag">${s.name}</span>`:'';}).join("")}
      </div>`;
    Admin.openModal("modal-staff-detail");
  }
</script>
</body>
</html>
