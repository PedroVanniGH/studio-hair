<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sucursales — Studio Hair Admin</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="../css/admin.css">
</head>
<body>
<div class="admin-layout">
  <div id="sidebar-mount"></div>
  <header class="admin-topbar" role="banner">
    <div class="topbar-title">Sucursales</div>
    <div class="topbar-actions">
      <div class="topbar-user"><div class="topbar-avatar" aria-hidden="true">A</div><span>Admin</span></div>
    </div>
  </header>
  <main class="admin-main">
    <div class="admin-page">
      <div class="admin-page-header">
        <div><h1>Sucursales</h1><p>Información y configuración de cada sucursal.</p></div>
      </div>

      <div id="branches-admin-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:24px"></div>
    </div>
  </main>
</div>
<div class="toast-container" id="toast-container" aria-live="polite"></div>
<script src="../js/data.js"></script>
<script src="../js/admin.js"></script>
<script src="shared.js"></script>
<script>
  Admin.requireAuth();

  const allApts = Store.getAppointments();
  const today = new Date().toISOString().split("T")[0];

  document.getElementById("branches-admin-grid").innerHTML = SH.branches.map(b => {
    const bApts   = allApts.filter(a => a.branch_id === b.id && !["cancelado"].includes(a.status));
    const todayApts = bApts.filter(a => a.date === today).length;
    const staffList = SH.staff.filter(s => s.active && s.branch_id === b.id);
    const hoursRows = Object.entries(b.hours).map(([d, h]) => {
      const labels = {lun:"Lu",mar:"Ma",mie:"Mi",jue:"Ju",vie:"Vi",sab:"Sá",dom:"Do"};
      return `<div style="display:flex;justify-content:space-between;font-size:.85rem;padding:4px 0;border-bottom:1px solid var(--c-border)"><span style="font-weight:600">${labels[d]||d}</span><span style="color:var(--c-muted)">${h}</span></div>`;
    }).join("");
    return `
    <div class="admin-card">
      <img src="${b.image}" alt="${b.name}" style="width:100%;height:180px;object-fit:cover">
      <div style="padding:20px">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px">
          <h3 style="font-family:var(--font-head);font-weight:700;font-size:1.05rem">${b.name}</h3>
          <span class="badge ${b.active ? 'badge-active' : 'badge-inactive'}">${b.active ? 'Activa' : 'Inactiva'}</span>
        </div>
        <div style="font-size:.88rem;color:var(--c-muted);margin-bottom:6px">📍 ${b.address}</div>
        <div style="font-size:.88rem;color:var(--c-muted);margin-bottom:6px">📞 ${b.phone}</div>
        <div style="font-size:.88rem;color:var(--c-muted);margin-bottom:16px">📧 ${b.email}</div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px">
          <div style="background:var(--c-bg);border-radius:var(--radius-sm);padding:12px;text-align:center">
            <div style="font-family:var(--font-head);font-weight:800;font-size:1.4rem;color:var(--c-gold)">${todayApts}</div>
            <div style="font-size:.78rem;color:var(--c-muted)">Turnos hoy</div>
          </div>
          <div style="background:var(--c-bg);border-radius:var(--radius-sm);padding:12px;text-align:center">
            <div style="font-family:var(--font-head);font-weight:800;font-size:1.4rem;color:var(--c-gold)">${staffList.length}</div>
            <div style="font-size:.78rem;color:var(--c-muted)">Profesionales</div>
          </div>
        </div>

        <details>
          <summary style="font-size:.85rem;font-weight:700;cursor:pointer;margin-bottom:8px">Ver horarios</summary>
          <div style="padding:8px 0">${hoursRows}</div>
        </details>

        <div style="margin-top:12px">
          <p style="font-size:.82rem;font-weight:600;margin-bottom:6px">Equipo:</p>
          <div style="display:flex;gap:6px;flex-wrap:wrap">
            ${staffList.map(p => `<span style="font-size:.78rem;background:var(--c-bg);border:1px solid var(--c-border);border-radius:100px;padding:2px 8px">${p.name.split(' ')[0]}</span>`).join("")}
          </div>
        </div>
      </div>
    </div>`;
  }).join("");
</script>
</body>
</html>
