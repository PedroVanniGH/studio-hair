<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nuestras Sucursales — Studio Hair Buenos Aires</title>
  <meta name="description" content="Studio Hair tiene dos sucursales en Buenos Aires: Palermo (Thames 1650) y Villa Crespo (Av. Corrientes 4820). Horarios, teléfonos y cómo llegar.">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div id="header-mount"></div>
<main>
  <div class="page-hero">
    <div class="container">
      <nav class="breadcrumb" aria-label="Ubicación"><a href="index.html">Inicio</a><span>›</span><span>Sucursales</span></nav>
      <h1>Nuestras sucursales</h1>
      <p>Misma calidad, dos ubicaciones estratégicas en Buenos Aires.</p>
    </div>
  </div>
  <section class="section">
    <div class="container">
      <div id="branches-container"></div>
    </div>
  </section>
</main>
<div id="footer-mount"></div>
<div id="cta-float-mount"></div>
<div id="cookie-mount"></div>
<div id="toast-mount"></div>
<script src="js/data.js"></script>
<script src="js/components.js"></script>
<script>
  document.addEventListener("DOMContentLoaded", () => {
    Components.init("sucursales");
    const days = ["dom","lun","mar","mie","jue","vie","sab"];
    const dayLabels = { lun:"Lunes",mar:"Martes",mie:"Miércoles",jue:"Jueves",vie:"Viernes",sab:"Sábado",dom:"Domingo" };

    document.getElementById("branches-container").innerHTML = SH.branches.map(b => {
      const staffInBranch = SH.staff.filter(s => s.active && s.branch_id === b.id);
      const hoursRows = Object.entries(b.hours).map(([day, hrs]) =>
        `<tr><td>${dayLabels[day]}</td><td>${hrs}</td></tr>`).join("");
      return `
      <article style="margin-bottom:64px">
        <div class="grid-2" style="align-items:start;gap:40px;margin-bottom:40px">
          <div>
            <img src="${b.image}" alt="${b.name}" style="width:100%;border-radius:var(--radius-lg);object-fit:cover;height:340px" loading="lazy">
          </div>
          <div>
            <h2 style="font-family:var(--font-head);font-size:1.8rem;font-weight:800;margin-bottom:20px">${b.name}</h2>
            <div class="branch-detail">
              <svg fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" aria-hidden="true" style="width:18px;height:18px;flex-shrink:0;stroke:var(--c-gold)"><path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1115 0z"/></svg>
              <span>${b.address}, ${b.city}</span>
            </div>
            <div class="branch-detail" style="margin-bottom:8px">
              <svg fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" aria-hidden="true" style="width:18px;height:18px;flex-shrink:0;stroke:var(--c-gold)"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 6.75c0 8.284 6.716 15 15 15h2.25a2.25 2.25 0 002.25-2.25v-1.372c0-.516-.351-.966-.852-1.091l-4.423-1.106c-.44-.11-.902.055-1.173.417l-.97 1.293c-.282.376-.769.542-1.21.38a12.035 12.035 0 01-7.143-7.143c-.162-.441.004-.928.38-1.21l1.293-.97c.363-.271.527-.734.417-1.173L6.963 3.102a1.125 1.125 0 00-1.091-.852H4.5A2.25 2.25 0 002.25 4.5v2.25z"/></svg>
              <a href="tel:${b.phone.replace(/\s+/g,'')}">${b.phone}</a>
            </div>
            <div class="branch-detail" style="margin-bottom:24px">
              <svg fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" aria-hidden="true" style="width:18px;height:18px;flex-shrink:0;stroke:var(--c-gold)"><path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75"/></svg>
              <a href="mailto:${b.email}">${b.email}</a>
            </div>

            <h3 style="font-family:var(--font-head);font-weight:700;font-size:.9rem;text-transform:uppercase;letter-spacing:.07em;margin-bottom:12px">Horarios de atención</h3>
            <table class="hours-table" aria-label="Horarios de ${b.name}"><tbody>${hoursRows}</tbody></table>

            <div style="display:flex;gap:12px;margin-top:24px;flex-wrap:wrap">
              <a href="reservar.html" class="btn btn-primary">✂ Reservar en esta sede</a>
              <a href="https://wa.me/${b.whatsapp}" target="_blank" rel="noopener" class="btn" style="background:#25D366;color:#fff">💬 WhatsApp</a>
            </div>
          </div>
        </div>

        <!-- Mapa -->
        <div style="border-radius:var(--radius-lg);overflow:hidden;margin-bottom:32px">
          <iframe src="${b.map_embed}" width="100%" height="320" style="border:0;display:block" allowfullscreen loading="lazy" referrerpolicy="no-referrer-when-downgrade" title="Mapa de ${b.name}"></iframe>
        </div>

        <!-- Profesionales en esta sede -->
        <h3 style="font-family:var(--font-head);font-weight:700;font-size:1.1rem;margin-bottom:20px">Equipo en ${b.name.replace('Studio Hair ','')}</h3>
        <div class="grid-4">
          ${staffInBranch.map(p => `
          <div style="text-align:center">
            <img src="${p.image}" alt="${p.name}" style="width:80px;height:80px;border-radius:50%;object-fit:cover;object-position:top;margin:0 auto 10px" loading="lazy">
            <div style="font-weight:700;font-size:.92rem">${p.name}</div>
            <div style="font-size:.8rem;color:var(--c-gold)">${p.role}</div>
          </div>`).join("")}
        </div>
      </article>
      <hr class="divider">`;
    }).join("");
  });
</script>
</body>
</html>
