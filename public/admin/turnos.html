<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Turnos — Studio Hair Admin</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="../css/admin.css">
</head>
<body>
<div class="admin-layout">
  <div id="sidebar-mount"></div>

  <header class="admin-topbar" role="banner">
    <div class="topbar-title">Gestión de Turnos</div>
    <div class="topbar-actions">
      <button class="btn btn-gold btn-sm" onclick="Admin.openModal('modal-new-apt')">+ Nuevo turno</button>
      <div class="topbar-user"><div class="topbar-avatar" aria-hidden="true">A</div><span>Admin</span></div>
    </div>
  </header>

  <main class="admin-main">
    <div class="admin-page">
      <div class="admin-page-header">
        <div>
          <h1>Turnos</h1>
          <p>Gestioná, confirmá y cancelá turnos de todas las sucursales.</p>
        </div>
      </div>

      <!-- Filtros -->
      <div class="admin-card mb-20">
        <div class="admin-card-header">
          <div class="filter-row">
            <div class="search-input-wrap">
              <svg fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z"/></svg>
              <input type="search" class="search-input" id="search-apt" placeholder="Buscar cliente..." aria-label="Buscar turno" oninput="loadAppointments()">
            </div>
            <select class="admin-select" id="filter-status" onchange="loadAppointments()" aria-label="Filtrar por estado">
              <option value="">Todos los estados</option>
              <option value="PENDIENTE">Pendiente</option>
              <option value="CONFIRMADO">Confirmado</option>
              <option value="COMPLETADO">Completado</option>
              <option value="CANCELADO">Cancelado</option>
              <option value="NO_SHOW">No-show</option>
            </select>
            <select class="admin-select" id="filter-branch" onchange="loadAppointments()" aria-label="Filtrar por sucursal">
              <option value="">Todas las sucursales</option>
            </select>
            <input type="date" class="admin-select" id="filter-date" onchange="loadAppointments()" aria-label="Filtrar por fecha">
          </div>
        </div>
      </div>

      <!-- Tabla -->
      <div class="admin-card">
        <div class="table-wrap">
          <table class="data-table" aria-label="Lista de turnos">
            <thead>
              <tr>
                <th>Fecha y hora</th>
                <th>Cliente</th>
                <th>Servicios</th>
                <th>Profesional</th>
                <th>Sucursal</th>
                <th>Estado</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody id="appointments-tbody">
              <tr><td colspan="7" class="empty-cell">Cargando...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- Detail modal -->
<div class="modal-backdrop" id="modal-apt-detail" role="dialog" aria-modal="true" aria-labelledby="apt-detail-title">
  <div class="modal">
    <div class="modal-header"><h3 id="apt-detail-title">Detalle del turno</h3>
      <button class="modal-close" onclick="Admin.closeModal('modal-apt-detail')" aria-label="Cerrar">✕</button></div>
    <div class="modal-body" id="apt-detail-body"></div>
    <div class="modal-footer"><button class="btn btn-outline" onclick="Admin.closeModal('modal-apt-detail')">Cerrar</button></div>
  </div>
</div>

<!-- New appointment modal -->
<div class="modal-backdrop" id="modal-new-apt" role="dialog" aria-modal="true" aria-labelledby="new-apt-title">
  <div class="modal">
    <div class="modal-header"><h3 id="new-apt-title">Nuevo turno manual</h3>
      <button class="modal-close" onclick="Admin.closeModal('modal-new-apt')" aria-label="Cerrar">✕</button></div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label" for="new-name">Nombre del cliente *</label>
          <input type="text" id="new-name" class="form-control" placeholder="Nombre y apellido" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="new-phone">Teléfono *</label>
          <input type="tel" id="new-phone" class="form-control" placeholder="11 4567-8900" required>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label" for="new-email">Email *</label>
        <input type="email" id="new-email" class="form-control" placeholder="email@ejemplo.com" required>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label" for="new-branch">Sucursal *</label>
          <select id="new-branch" class="form-control" required>
            <option value="">Seleccioná sucursal</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label" for="new-service">Servicio *</label>
          <select id="new-service" class="form-control" required>
            <option value="">Seleccioná servicio</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label" for="new-staff">Profesional</label>
          <select id="new-staff" class="form-control">
            <option value="">Cualquier profesional</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label" for="new-status">Estado</label>
          <select id="new-status" class="form-control">
            <option value="confirmado">Confirmado</option>
            <option value="pendiente">Pendiente</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label" for="new-date">Fecha *</label>
          <input type="date" id="new-date" class="form-control" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="new-time">Hora *</label>
          <input type="time" id="new-time" class="form-control" min="09:00" max="20:00" step="1800" required>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label" for="new-notes">Notas</label>
        <textarea id="new-notes" class="form-control" rows="2" placeholder="Notas adicionales..."></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="Admin.closeModal('modal-new-apt')">Cancelar</button>
      <button class="btn btn-gold" onclick="createManualAppointment()">Crear turno</button>
    </div>
  </div>
</div>

<div class="toast-container" id="toast-container" aria-live="polite"></div>
<script src="../js/data.js"></script>
<script src="../js/admin.js"></script>
<script src="shared.js"></script>
<script>
  Admin.requireAuth();

  let _apiServices = [];   // {id, name, durationMin, price}
  let _apiBranches = [];   // {id, name}
  let _apiProfessionals = []; // {id, name}

  function aptStatusClass(s) {
    const map = { PENDIENTE:'pending', CONFIRMADO:'confirmed', COMPLETADO:'completed', CANCELADO:'cancelled', NO_SHOW:'noshow' };
    return map[s] || 'pending';
  }
  function fmtCurrency(n) {
    return new Intl.NumberFormat('es-AR', { style:'currency', currency:'ARS', maximumFractionDigits:0 }).format(Number(n));
  }

  // ── Cargar datos de selects ─────────────────────────────────
  async function initSelects() {
    const [branchRes, svcRes, proRes] = await Promise.all([
      fetch('/api/branches', { credentials:'include' }).then(r=>r.json()),
      fetch('/api/services', { credentials:'include' }).then(r=>r.json()),
      fetch('/api/admin/professionals', { credentials:'include' }).then(r=>r.json()),
    ]);

    _apiBranches = branchRes;
    _apiServices = svcRes;
    _apiProfessionals = proRes.filter(p=>p.active);

    const filterBranch = document.getElementById('filter-branch');
    const newBranch    = document.getElementById('new-branch');
    _apiBranches.forEach(b => {
      filterBranch.innerHTML += `<option value="${b.id}">${b.name}</option>`;
      newBranch.innerHTML    += `<option value="${b.id}">${b.name}</option>`;
    });

    const newService = document.getElementById('new-service');
    _apiServices.forEach(s => {
      newService.innerHTML += `<option value="${s.id}">${s.name} — ${fmtCurrency(s.price)}</option>`;
    });

    const newStaff = document.getElementById('new-staff');
    _apiProfessionals.forEach(p => {
      newStaff.innerHTML += `<option value="${p.id}">${p.name}</option>`;
    });

    // Leer filtro de URL
    const params = new URLSearchParams(location.search);
    if (params.get('filter')) {
      document.getElementById('filter-status').value = params.get('filter').toUpperCase();
    }

    loadAppointments();
  }

  // ── Tabla de turnos ─────────────────────────────────────────
  async function loadAppointments() {
    const tbody  = document.getElementById('appointments-tbody');
    const status = document.getElementById('filter-status').value;
    const branch = document.getElementById('filter-branch').value;
    const date   = document.getElementById('filter-date').value;
    const search = document.getElementById('search-apt').value;

    const params = new URLSearchParams({ limit: 100 });
    if (status) params.set('status', status);
    if (branch) params.set('branchId', branch);
    if (date)   params.set('date', date);
    if (search) params.set('search', search);

    tbody.innerHTML = `<tr><td colspan="7" class="empty-cell">Cargando...</td></tr>`;

    try {
      const data = await fetch(`/api/admin/appointments?${params}`, { credentials:'include' }).then(r=>r.json());
      const apts = data.appointments || [];

      if (!apts.length) {
        tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;padding:32px;color:var(--c-muted)">No hay turnos que coincidan con el filtro.</td></tr>`;
        return;
      }

      tbody.innerHTML = apts.map(apt => {
        const svcList = (apt.services||[]).map(as=>as.service.name).join(', ');
        const staff   = apt.professional?.name || 'Cualquiera';
        const price   = (apt.services||[]).reduce((s,as)=>s+Number(as.service.price),0);
        const dateStr = apt.date ? apt.date.split('T')[0].split('-').reverse().join('/') : '—';
        return `<tr>
          <td>${dateStr} ${apt.startTime}</td>
          <td><strong>${apt.customer?.name||'—'}</strong><br><small style="color:var(--c-muted)">${apt.customer?.phone||''}</small></td>
          <td title="${svcList}">${svcList.length>30?svcList.slice(0,30)+'…':svcList}</td>
          <td>${staff}</td>
          <td>${apt.branch?.name||'—'}</td>
          <td><span class="badge badge-${aptStatusClass(apt.status)}">${apt.status}</span></td>
          <td>
            <div class="table-actions">
              <select class="admin-select" style="font-size:.78rem;padding:4px 8px" onchange="changeAptStatus('${apt.id}',this.value,this)" aria-label="Cambiar estado">
                ${['PENDIENTE','CONFIRMADO','COMPLETADO','CANCELADO','NO_SHOW'].map(s =>
                  `<option value="${s}" ${apt.status===s?'selected':''}>${s}</option>`).join('')}
              </select>
              <button class="action-btn delete" onclick="deleteApt('${apt.id}',this)">✕</button>
            </div>
          </td>
        </tr>`;
      }).join('');
    } catch(_) {
      tbody.innerHTML = `<tr><td colspan="7" class="empty-cell">Error al cargar turnos.</td></tr>`;
    }
  }

  async function changeAptStatus(id, status, sel) {
    sel.disabled = true;
    try {
      const r = await fetch(`/api/admin/appointments/${id}/status`, {
        method:'PATCH', credentials:'include',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ status }),
      });
      if (!r.ok) throw await r.json();
      Admin.toast(`Estado actualizado a: ${status}`, 'success');
      loadAppointments();
    } catch(e) { Admin.toast(e?.error||'Error al actualizar.', 'error'); sel.disabled=false; }
  }

  async function deleteApt(id, btn) {
    if (!confirm('¿Eliminar este turno permanentemente?')) return;
    btn.disabled = true;
    try {
      const r = await fetch(`/api/admin/appointments/${id}`, { method:'DELETE', credentials:'include' });
      if (!r.ok) throw await r.json();
      Admin.toast('Turno eliminado.', 'success');
      loadAppointments();
    } catch(e) { Admin.toast(e?.error||'Error al eliminar.', 'error'); btn.disabled=false; }
  }

  // ── Crear turno manual ──────────────────────────────────────
  async function createManualAppointment() {
    const name    = document.getElementById('new-name').value.trim();
    const phone   = document.getElementById('new-phone').value.trim();
    const email   = document.getElementById('new-email').value.trim();
    const branch  = document.getElementById('new-branch').value;
    const service = document.getElementById('new-service').value;
    const staff   = document.getElementById('new-staff').value;
    const status  = document.getElementById('new-status').value;
    const date    = document.getElementById('new-date').value;
    const time    = document.getElementById('new-time').value;
    const notes   = document.getElementById('new-notes').value;

    if (!name || !phone || !email || !branch || !service || !date || !time) {
      Admin.toast('Completá todos los campos requeridos.', 'error'); return;
    }

    try {
      const r = await fetch('/api/appointments', {
        method:'POST', credentials:'include',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
          branchId:       Number(branch),
          professionalId: staff ? Number(staff) : null,
          services:       [Number(service)],
          date, startTime: time,
          customer:       { name, email, phone },
          notes,
        }),
      });
      const data = await r.json();
      if (!r.ok) throw data;

      // Si el admin quiere estado diferente a PENDIENTE, actualizar
      if (status !== 'PENDIENTE') {
        await fetch(`/api/admin/appointments/${data.id}/status`, {
          method:'PATCH', credentials:'include',
          headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ status: status.toUpperCase() }),
        });
      }

      Admin.toast('Turno creado correctamente.', 'success');
      Admin.closeModal('modal-new-apt');
      // Limpiar modal
      ['new-name','new-phone','new-email','new-notes'].forEach(id => document.getElementById(id).value='');
      loadAppointments();
    } catch(e) { Admin.toast(e?.error||'Error al crear turno.', 'error'); }
  }

  initSelects();
</script>
</body>
</html>
