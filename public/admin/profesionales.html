<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profesionales — Studio Hair Admin</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="../css/admin.css">
</head>
<body>
<div class="admin-layout">
  <div id="sidebar-mount"></div>
  <header class="admin-topbar" role="banner">
    <div class="topbar-title">Profesionales</div>
    <div class="topbar-actions">
      <div class="topbar-user"><div class="topbar-avatar" aria-hidden="true">A</div><span>Admin</span></div>
    </div>
  </header>
  <main class="admin-main">
    <div class="admin-page">
      <div class="admin-page-header">
        <div><h1>Profesionales</h1><p>Equipo de trabajo de todas las sucursales.</p></div>
      </div>

      <!-- Cards de profesionales -->
      <div id="staff-admin-grid" class="staff-admin-grid"></div>
    </div>
  </main>
</div>

<!-- Modal detalle profesional -->
<div class="modal-backdrop" id="modal-staff-detail" role="dialog" aria-modal="true" aria-labelledby="staff-detail-title">
  <div class="modal">
    <div class="modal-header">
      <h3 id="staff-detail-title">Perfil del profesional</h3>
      <button class="modal-close" onclick="Admin.closeModal('modal-staff-detail')" aria-label="Cerrar">✕</button>
    </div>
    <div class="modal-body" id="staff-detail-body"></div>
    <div class="modal-footer"><button class="btn btn-outline" onclick="Admin.closeModal('modal-staff-detail')">Cerrar</button></div>
  </div>
</div>

<div class="toast-container" id="toast-container" aria-live="polite"></div>
<script src="../js/admin.js"></script>
<script src="shared.js"></script>
<script>
  Admin.requireAuth();

  async function loadProfessionals() {
    const grid = document.getElementById('staff-admin-grid');
    grid.innerHTML = '<p class="admin-empty-msg" style="padding:24px">Cargando...</p>';

    try {
      const pros = await fetch('/api/admin/professionals', { credentials:'include' }).then(r=>r.json());
      const active = pros.filter(p => p.active);

      if (!active.length) {
        grid.innerHTML = '<p class="admin-empty-msg" style="padding:24px">No hay profesionales activos.</p>';
        return;
      }

      grid.innerHTML = active.map(p => {
        const initials  = p.name.split(' ').map(n=>n[0]).slice(0,2).join('').toUpperCase();
        const photoHTML = p.photoUrl
          ? `<img src="${p.photoUrl}" alt="${p.name}" class="staff-admin-avatar">`
          : `<div class="staff-admin-avatar" style="display:flex;align-items:center;justify-content:center;background:var(--c-gold);color:#000;font-weight:700;font-size:1.1rem">${initials}</div>`;
        const specialties = (p.services||[]).map(ps=>ps.service.name).slice(0,3);
        return `
        <div class="admin-card admin-card--clickable" onclick="viewProfessional(${p.id})">
          <div class="staff-admin-card-header">
            ${photoHTML}
            <div class="staff-admin-info">
              <div class="staff-admin-name">${p.name}</div>
              <div class="staff-admin-role">${p.role}</div>
              <div class="staff-admin-loc">📍 ${p.branch?.name?.replace('Studio Hair ','') || '—'}</div>
              <div class="staff-admin-stats">
                <span class="text-gold">★ ${p.rating ?? '—'}</span>
                <span class="text-muted">(${p.reviewCount ?? 0} reseñas)</span>
                <span class="text-muted">· ${p._count?.appointments ?? 0} turnos</span>
              </div>
            </div>
            <span class="badge badge-active">Activo</span>
          </div>
          <div class="staff-admin-specialties">
            ${specialties.map(s=>`<span class="specialty-tag">${s}</span>`).join('')}
          </div>
        </div>`;
      }).join('');

      window._pros = pros;
    } catch(_) {
      grid.innerHTML = '<p class="admin-empty-msg" style="padding:24px">Error al cargar profesionales.</p>';
    }
  }

  function viewProfessional(id) {
    const p = (window._pros || []).find(x => x.id === id);
    if (!p) return;
    const initials  = p.name.split(' ').map(n=>n[0]).slice(0,2).join('').toUpperCase();
    const photoHTML = p.photoUrl
      ? `<img src="${p.photoUrl}" alt="${p.name}" class="staff-detail-avatar">`
      : `<div class="staff-detail-avatar" style="display:flex;align-items:center;justify-content:center;background:var(--c-gold);color:#000;font-weight:700;font-size:1.4rem">${initials}</div>`;
    const services = (p.services||[]).map(ps=>ps.service.name);

    document.getElementById('staff-detail-body').innerHTML = `
      <div class="staff-detail-header">
        ${photoHTML}
        <div>
          <h3 class="staff-detail-name">${p.name}</h3>
          <div class="staff-detail-role">${p.role}</div>
          <div class="staff-detail-loc">📍 ${p.branch?.name || '—'}</div>
          ${p.instagram ? `<div class="staff-detail-loc">📸 ${p.instagram}</div>` : ''}
        </div>
      </div>
      ${p.bio ? `<p class="staff-detail-bio">${p.bio}</p>` : ''}
      <p class="staff-detail-row"><strong>Rating:</strong> ★ ${p.rating ?? '—'} (${p.reviewCount ?? 0} reseñas)</p>
      <p class="staff-detail-row"><strong>Total de turnos:</strong> ${p._count?.appointments ?? 0}</p>
      ${services.length ? `<p class="staff-detail-row"><strong>Servicios habilitados:</strong></p>
        <div class="tags-flex">${services.map(s=>`<span class="specialty-tag">${s}</span>`).join('')}</div>` : ''}`;
    Admin.openModal('modal-staff-detail');
  }

  loadProfessionals();
</script>
</body>
</html>
