<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sucursales — Studio Hair Admin</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="../css/admin.css">
</head>
<body>
<div class="admin-layout">
  <div id="sidebar-mount"></div>
  <header class="admin-topbar" role="banner">
    <div class="topbar-title">Sucursales</div>
    <div class="topbar-actions">
      <div class="topbar-user"><div class="topbar-avatar" aria-hidden="true">A</div><span>Admin</span></div>
    </div>
  </header>
  <main class="admin-main">
    <div class="admin-page">
      <div class="admin-page-header">
        <div><h1>Sucursales</h1><p>Información y configuración de cada sucursal.</p></div>
      </div>

      <div id="branches-admin-grid" class="branches-admin-grid"></div>
    </div>
  </main>
</div>
<div class="toast-container" id="toast-container" aria-live="polite"></div>
<script src="../js/data.js"></script>
<script src="../js/admin.js"></script>
<script src="shared.js"></script>
<script>
  Admin.requireAuth();

  const allApts = Store.getAppointments();
  const today = new Date().toISOString().split("T")[0];

  document.getElementById("branches-admin-grid").innerHTML = SH.branches.map(b => {
    const bApts   = allApts.filter(a => a.branch_id === b.id && !["cancelado"].includes(a.status));
    const todayApts = bApts.filter(a => a.date === today).length;
    const staffList = SH.staff.filter(s => s.active && s.branch_id === b.id);
    const hoursRows = Object.entries(b.hours).map(([d, h]) => {
      const labels = {lun:"Lu",mar:"Ma",mie:"Mi",jue:"Ju",vie:"Vi",sab:"Sá",dom:"Do"};
      return `<div class="branch-admin-hours-row"><span class="branch-admin-hours-day">${labels[d]||d}</span><span class="text-muted">${h}</span></div>`;
    }).join("");
    return `
    <div class="admin-card">
      <img src="${b.image}" alt="${b.name}" class="branch-admin-img">
      <div class="branch-admin-body">
        <div class="branch-admin-head">
          <h3 class="branch-admin-name">${b.name}</h3>
          <span class="badge ${b.active ? 'badge-active' : 'badge-inactive'}">${b.active ? 'Activa' : 'Inactiva'}</span>
        </div>
        <div class="branch-admin-info">📍 ${b.address}</div>
        <div class="branch-admin-info">📞 ${b.phone}</div>
        <div class="branch-admin-info">📧 ${b.email}</div>

        <div class="branch-admin-stats">
          <div class="branch-admin-stat">
            <div class="branch-admin-stat-val">${todayApts}</div>
            <div class="branch-admin-stat-lbl">Turnos hoy</div>
          </div>
          <div class="branch-admin-stat">
            <div class="branch-admin-stat-val">${staffList.length}</div>
            <div class="branch-admin-stat-lbl">Profesionales</div>
          </div>
        </div>

        <details>
          <summary class="branch-admin-summary">Ver horarios</summary>
          <div class="branch-admin-hours-wrap">${hoursRows}</div>
        </details>

        <div class="mt-12">
          <p class="branch-admin-team-label">Equipo:</p>
          <div class="branch-admin-team">
            ${staffList.map(p => `<span class="branch-admin-member">${p.name.split(' ')[0]}</span>`).join("")}
          </div>
        </div>
      </div>
    </div>`;
  }).join("");
</script>
</body>
</html>
