<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — Studio Hair</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="../css/admin.css">
</head>
<body>
<main class="login-page">
  <div class="login-card">
    <div class="login-logo">✂ Studio <span>Hair</span><small>Panel de administración</small></div>
    <div class="login-error" id="login-error" role="alert" aria-live="polite"></div>
    <form id="login-form" novalidate>
      <div class="form-group">
        <label class="form-label" for="admin-email">Email</label>
        <input type="email" id="admin-email" class="form-control"
               placeholder="admin@studiohair.com.ar"
               autocomplete="email" required>
      </div>
      <div class="form-group">
        <label class="form-label" for="admin-password">Contraseña</label>
        <input type="password" id="admin-password" class="form-control"
               placeholder="••••••••"
               autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn btn-primary btn-full mt-8" id="login-btn">
        Ingresar al panel
      </button>
    </form>
    <div class="login-back">
      <a href="../index.html">← Volver al sitio público</a>
    </div>
  </div>
  <div class="toast-container" id="toast-container" aria-live="polite"></div>
</main>

<script>
  // Verificar sesión activa (JWT en cookie httpOnly)
  fetch('/api/admin/auth/me', { credentials: 'include' })
    .then(r => { if (r.ok) window.location.href = 'dashboard.html'; })
    .catch(() => {});

  document.getElementById('login-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    const email    = document.getElementById('admin-email').value.trim();
    const password = document.getElementById('admin-password').value;
    const btn      = document.getElementById('login-btn');
    const errorEl  = document.getElementById('login-error');

    errorEl.textContent = '';
    btn.disabled = true;
    btn.textContent = 'Ingresando...';

    try {
      const res  = await fetch('/api/admin/auth/login', {
        method:      'POST',
        headers:     { 'Content-Type': 'application/json' },
        credentials: 'include',
        body:        JSON.stringify({ email, password }),
      });
      const data = await res.json();

      if (res.ok) {
        window.location.href = 'dashboard.html';
      } else {
        errorEl.textContent = data.error || 'Credenciales incorrectas';
        btn.disabled = false;
        btn.textContent = 'Ingresar al panel';
      }
    } catch (_) {
      errorEl.textContent = 'Error de conexión. Verificá que el servidor esté corriendo.';
      btn.disabled = false;
      btn.textContent = 'Ingresar al panel';
    }
  });
</script>
</body>
</html>
