<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog de Peluquería — Studio Hair Buenos Aires</title>
  <meta name="description" content="Consejos y tendencias de peluquería: cómo cuidar el color, tendencias 2026, guía de barba, keratina y más. Blog oficial de Studio Hair.">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div id="header-mount"></div>
<main>
  <div class="page-hero">
    <div class="container">
      <nav class="breadcrumb" aria-label="Ubicación"><a href="index.html">Inicio</a><span>›</span><span>Blog</span></nav>
      <h1>Blog Studio Hair</h1>
      <p>Consejos, tendencias y novedades del mundo de la peluquería.</p>
    </div>
  </div>
  <section class="section">
    <div class="container">
      <div class="grid-3" id="blog-grid"></div>
    </div>
  </section>

  <!-- Full post modal -->
  <div class="modal-backdrop" id="post-modal" role="dialog" aria-modal="true" aria-labelledby="post-modal-title">
    <div class="modal" style="max-width:720px">
      <div class="modal-header">
        <h3 id="post-modal-title">Post</h3>
        <button class="modal-close" onclick="document.getElementById('post-modal').classList.remove('open');document.body.style.overflow=''" aria-label="Cerrar">✕</button>
      </div>
      <div class="modal-body" id="post-modal-body"></div>
    </div>
  </div>

</main>
<div id="footer-mount"></div>
<div id="cta-float-mount"></div>
<div id="cookie-mount"></div>
<div id="toast-mount"></div>
<script src="js/data.js"></script>
<script src="js/components.js"></script>
<script>
  document.addEventListener("DOMContentLoaded", () => {
    Components.init("blog");
    document.getElementById("blog-grid").innerHTML = SH.blog.map(post => `
      <article class="card blog-card">
        <img src="${post.image}" alt="${post.title}" class="card-img" style="aspect-ratio:16/9;object-fit:cover" loading="lazy">
        <div class="card-body">
          <div class="blog-meta">
            <span>📁 ${post.category}</span>
            <span>✍ ${post.author}</span>
            <span>📅 ${post.date.split("-").reverse().join("/")}</span>
          </div>
          <h2 class="card-title" style="font-size:1.05rem">${post.title}</h2>
          <p class="card-text">${post.excerpt}</p>
          <div style="margin-top:12px;display:flex;gap:6px;flex-wrap:wrap">
            ${post.tags.map(t => `<span style="background:var(--c-bg);border:1px solid var(--c-border);border-radius:100px;padding:2px 10px;font-size:.75rem;color:var(--c-muted)">#${t}</span>`).join("")}
          </div>
        </div>
        <div class="card-footer">
          <button class="btn btn-outline btn-sm btn-full" onclick="openPost('${post.id}')">Leer artículo →</button>
        </div>
      </article>`).join("");
  });

  function openPost(id) {
    const post = SH.blog.find(p => p.id === id);
    if (!post) return;
    document.getElementById("post-modal-title").textContent = post.title;
    document.getElementById("post-modal-body").innerHTML = `
      <img src="${post.image}" alt="${post.title}" style="width:100%;border-radius:var(--radius);margin-bottom:20px;max-height:300px;object-fit:cover">
      <div style="display:flex;gap:12px;font-size:.82rem;color:var(--c-muted);margin-bottom:20px">
        <span>📁 ${post.category}</span>
        <span>✍ ${post.author}</span>
        <span>📅 ${post.date.split("-").reverse().join("/")}</span>
      </div>
      <div style="font-size:.95rem;line-height:1.8;color:var(--c-text)">
        ${post.content.split("\n\n").map(p =>
          p.startsWith("**") ? `<h3 style="font-family:var(--font-head);font-weight:700;margin:20px 0 8px">${p.replace(/\*\*/g,"")}</h3>` :
          p.match(/^\d\./) ? `<p style="margin-bottom:8px">${p.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')}</p>` :
          `<p style="margin-bottom:12px">${p.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')}</p>`
        ).join("")}
      </div>
      <hr style="margin:24px 0;border:none;border-top:1px solid var(--c-border)">
      <a href="reservar.html" class="btn btn-primary">✂ Reservar turno</a>`;
    document.getElementById("post-modal").classList.add("open");
    document.body.style.overflow = "hidden";
  }
</script>
</body>
</html>
